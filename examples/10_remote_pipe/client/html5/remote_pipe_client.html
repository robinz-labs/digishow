<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Virtual Pipe Demo</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript">
        var SERVER_IP = "127.0.0.1";
        var SERVER_PORT = 50000;
        var ws = null;

        function setup() {
            if ("WebSocket" in window) {
                var url = window.location.toString();
                var query = url.split("?ip=");
                if (query.length == 2) SERVER_IP = query[1];

                ws = new WebSocket("ws://" + SERVER_IP + ":" + SERVER_PORT);
            
                ws.onopen = function() {
                    var statusEl = document.getElementById("status-indicator");
                    statusEl.innerHTML = "DigiShow Connected";
                    statusEl.className = "status-badge connected";
                };
            
                ws.onmessage = function(evt) { 
                    var msgIn = evt.data;
                    document.getElementById("message-display").innerHTML = "📥 Received: " + msgIn;
                };
            
                ws.onclose = function() { 
                    var statusEl = document.getElementById("status-indicator");
                    statusEl.innerHTML = "DigiShow Disconnected";
                    statusEl.className = "status-badge";
                };
            } else {
                alert("WebSocket is not supported by your browser.");
            }
        }

        function sendCmd(msgOut) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(msgOut);
                document.getElementById("message-display").innerHTML = "📤 Sent: " + msgOut;
            } else {
                alert("WebSocket is not connected.");
            }
        }
    </script>
</head>
<body onload="setup()">
    <div class="container">
        <h1>Remote Virtual Pipe Demo</h1>
        
        <div class="description">
            Please open and start file <strong>remote_pipe_demo.dgs</strong> in DigiShow LINK app,
            and refresh this web page to demonstrate the communication between the DigiShow app and your web app.
        </div>

        <div class="control-group">
            <div class="control-title">Channel Analog 1</div>
            <div class="button-row">
                <button onclick="sendCmd('dgss,1,65,0,65535,0')">0%</button>
                <button onclick="sendCmd('dgss,1,65,32767,65535,0')">50%</button>
                <button onclick="sendCmd('dgss,1,65,65535,65535,0')">100%</button>
            </div>
        </div>

        <div class="control-group">
            <div class="control-title">Channel Binary 2</div>
            <div class="button-row">
                <button class="btn-off" onclick="sendCmd('dgss,2,66,0,0,0')">Off</button>
                <button class="btn-on" onclick="sendCmd('dgss,2,66,0,0,1')">On</button>
            </div>
        </div>

        <div class="status-panel">
            <div class="status-header">
                <span style="font-size: 0.875rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Console</span>
                <div id="status-indicator" class="status-badge">Connecting...</div>
            </div>
            <div id="message-display" class="message-box">Waiting for messages...</div>
        </div>
    </div>
</body>
</html>
